<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>משחק תרגול · השקעות לעצלנים 🦥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link href="assets/brand.css" rel="stylesheet">
<style>
/* ===== game-specific only (tokens + shared classes come from brand.css) ===== */
.game-wrap{max-width:640px;margin:0 auto;padding:26px 22px 60px}
.game-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:24px 22px;position:relative;overflow:hidden}

/* HUD */
.hud{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
.hearts{display:flex;gap:4px;font-size:22px;line-height:1}
.hearts span{transition:transform .25s,opacity .25s,filter .25s}
.hearts span.lost{opacity:.28;filter:grayscale(1);transform:scale(.82)}
.xp{display:inline-flex;align-items:center;gap:7px;background:var(--yellow-soft);color:#a8780a;font-weight:800;font-size:15px;padding:7px 14px;border-radius:30px}
.xp .num{transition:transform .2s}
.xp.bump .num{transform:scale(1.35)}
.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.progress-row .bar{flex:1}
.progress-row small{color:var(--muted);font-weight:700;white-space:nowrap;font-size:13px}

/* streak chip */
.streak{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:14px;color:var(--orange)}
.streak.hide{visibility:hidden}

/* question */
.q-mascot{font-size:40px;line-height:1;margin-bottom:8px;display:inline-block;transition:transform .3s}
.q-mascot.react{animation:bob .5s ease}
@keyframes bob{0%{transform:translateY(0) rotate(0)}30%{transform:translateY(-10px) rotate(-8deg)}60%{transform:translateY(0) rotate(6deg)}100%{transform:translateY(0) rotate(0)}}
.q-text{font-size:23px;font-weight:900;line-height:1.4;margin-bottom:20px;color:var(--ink)}

/* options */
.opts{display:grid;gap:12px}
.opt{display:flex;align-items:center;gap:12px;text-align:right;width:100%;font-family:inherit;font-size:17px;font-weight:700;color:var(--ink);background:var(--card);border:2px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;transition:transform .12s,border-color .15s,background .15s,box-shadow .15s}
.opt:hover:not(:disabled){border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow)}
.opt:active:not(:disabled){transform:translateY(0)}
.opt:disabled{cursor:default}
.opt .key{width:30px;height:30px;flex:none;display:grid;place-items:center;border-radius:9px;background:var(--green-soft);color:var(--green-deep);font-weight:900;font-size:15px;transition:.15s}
.opt.correct{border-color:var(--green);background:var(--green-soft);animation:pop .35s ease}
.opt.correct .key{background:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:#fdeaea}
.opt.wrong .key{background:var(--red);color:#fff}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.035)}100%{transform:scale(1)}}

/* feedback banner */
.banner{margin-top:18px;border-radius:16px;padding:15px 16px;font-weight:600;display:flex;gap:11px;align-items:flex-start;line-height:1.5;opacity:0;transform:translateY(10px);transition:.3s;max-height:0;overflow:hidden;padding-top:0;padding-bottom:0}
.banner.show{opacity:1;transform:none;max-height:300px;padding-top:15px;padding-bottom:15px}
.banner.ok{background:var(--green-soft);color:var(--green-deep)}
.banner.bad{background:#fdeaea;color:var(--red)}
.banner .b-emoji{font-size:22px;line-height:1.2;flex:none}
.banner .b-title{font-weight:900;display:block;margin-bottom:2px}
.banner .b-why{font-weight:600;color:var(--ink)}
.banner.bad .b-why{color:#7a2020}

.next-row{margin-top:18px;display:none}
.next-row.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.next-row .btn{width:100%;justify-content:center;font-size:17px;padding:15px}

/* ===== end screen ===== */
.end{text-align:center;padding:10px 4px}
.end .big-sloth{font-size:74px;line-height:1;display:inline-block;animation:bob .7s ease}
.end h2{font-size:27px;font-weight:900;margin:10px 0 4px}
.end .sub{color:var(--muted);font-weight:600;margin-bottom:22px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:26px}
.stat{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:16px 20px;min-width:120px}
.stat .v{font-size:30px;font-weight:900;color:var(--green-deep);line-height:1}
.stat .l{font-size:13px;color:var(--muted);font-weight:700;margin-top:5px}
.end-actions{display:grid;gap:11px;max-width:340px;margin:0 auto}
.end-actions .btn{width:100%;justify-content:center;font-size:17px;padding:15px}

/* confetti */
.confetti{position:fixed;top:-12px;width:11px;height:14px;z-index:150;border-radius:2px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9}}

/* ===== leaderboard ===== */
.lb-toggle{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-weight:800;font-size:13px;color:var(--green-deep);background:var(--green-soft);border:0;border-radius:30px;padding:7px 13px;cursor:pointer;transition:transform .12s,box-shadow .15s}
.lb-toggle:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.lb-toggle:active{transform:translateY(0)}

.lb-overlay{position:fixed;inset:0;background:rgba(15,36,28,.55);display:flex;align-items:center;justify-content:center;padding:18px;z-index:400;opacity:0;pointer-events:none;transition:opacity .25s}
.lb-overlay.show{opacity:1;pointer-events:auto}
.lb-modal{background:var(--card);border-radius:26px;max-width:440px;width:100%;max-height:86vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding:24px 22px;transform:translateY(14px) scale(.98);transition:transform .28s}
.lb-overlay.show .lb-modal{transform:none}
.lb-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.lb-head h3{font-size:20px;font-weight:900;color:var(--ink)}
.lb-head .x{background:none;border:0;font-size:26px;color:var(--muted);cursor:pointer;line-height:1}
.lb-list{display:grid;gap:9px}
.lb-row{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:var(--card)}
.lb-row .rank{width:32px;flex:none;text-align:center;font-weight:900;font-size:16px;color:var(--muted)}
.lb-row .ava{width:34px;height:34px;flex:none;display:grid;place-items:center;border-radius:50%;background:var(--green-soft);font-size:18px}
.lb-row .nm{flex:1;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-row .pts{font-weight:900;color:var(--green-deep);font-size:15px;white-space:nowrap}
.lb-row.me{background:var(--green-soft);border-color:var(--green);font-weight:800}
.lb-row.me .nm{font-weight:900}
.lb-row .me-tag{font-size:11px;font-weight:900;color:#fff;background:var(--green);border-radius:20px;padding:2px 8px;margin-right:2px;white-space:nowrap}

/* end-screen mini leaderboard */
.lb-mini{max-width:360px;margin:0 auto 22px;text-align:right}
.lb-mini .mini-title{font-size:14px;font-weight:900;color:var(--muted);margin-bottom:9px;text-align:center}
.lb-mini .lb-list{gap:7px}
.lb-mini .lb-row{padding:9px 11px}

@media(max-width:560px){
  .q-text{font-size:20px}
  .opt{font-size:16px;padding:14px 15px}
  .game-card{padding:20px 16px}
  .lb-modal{padding:20px 16px}
}
</style>
</head>
<body>

<div class="demo-flag">🦥 דמו פורטל · <b>השקעות לעצלנים</b> · משחק תרגול</div>

<header class="topbar"><div class="wrap">
  <div class="brand"><span class="sloth">🦥</span> השקעות לעצלנים</div>
  <nav class="nav">
    <a href="index.html">הבית שלי</a>
    <a href="lesson.html">הקורס</a>
    <a href="game.html" class="active">משחק תרגול</a>
    <a href="community.html">הקהילה</a>
    <a href="calculator.html">מחשבונים</a>
  </nav>
  <div class="me"><a href="admin.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:600" title="מבט הבעלים">⚙️ ניהול</a><a href="profile.html" style="display:flex;align-items:center;gap:10px"><div style="text-align:left"><div style="font-weight:700;line-height:1.1">דנה</div><small>חברה מאז 2026</small></div><div class="avatar">ד</div></a></div>
</div></header>

<main class="game-wrap">
  <div class="game-card" id="card"><!-- rendered by JS --></div>
</main>

<div class="lb-overlay" id="lbOverlay">
  <div class="lb-modal" role="dialog" aria-modal="true" aria-label="לוח המובילים">
    <div class="lb-head">
      <h3>לוח המובילים · החודש</h3>
      <button class="x" id="lbClose" aria-label="סגור">×</button>
    </div>
    <div class="lb-list" id="lbList"></div>
  </div>
</div>

<footer><div class="wrap"><div>© השקעות לעצלנים · הדרך הקלה להשקעות פסיביות 🦥</div><div class="credit">נבנה ע"י הלל</div></div></footer>

<script src="data/content.js"></script>
<script src="assets/portal.js"></script>
<script>
(function(){
  const QUESTIONS = (window.LAZY && Array.isArray(LAZY.game)) ? LAZY.game : [];
  const TOTAL = QUESTIONS.length;
  const MAX_HEARTS = 3;
  const XP_PER = 10;
  const KEYS = ['א','ב','ג','ד'];
  const card = document.getElementById('card');

  const PRAISE = ['יש!','אלוף!','כל הכבוד!','מצוין!','בול!','עף על זה!'];
  const SLOTH_OK = ['🦥','😎','🥳','🤩'];
  const MISS = ['כמעט!','לא נורא, ממשיכים','עוד תפוס את זה','קורה לכולם'];

  let state;
  function reset(){ state = { i:0, xp:0, hearts:MAX_HEARTS, streak:0, correctCount:0, locked:false }; }

  function rand(a){ return a[Math.floor(Math.random()*a.length)]; }

  function renderQuestion(){
    const q = QUESTIONS[state.i];
    const pct = Math.round((state.i / TOTAL) * 100);
    const hearts = Array.from({length:MAX_HEARTS}, (_,k)=>
      `<span class="${k < state.hearts ? '' : 'lost'}">❤️</span>`).join('');
    const streakChip = state.streak >= 2
      ? `<span class="streak">🔥 רצף ${state.streak}</span>`
      : `<span class="streak hide">🔥</span>`;

    card.innerHTML = `
      <div class="hud">
        <div class="hearts">${hearts}</div>
        ${streakChip}
        <div class="xp" id="xp"><span>⭐</span><span class="num">${state.xp}</span> XP</div>
      </div>
      <div class="progress-row">
        <small>שאלה ${state.i+1} מתוך ${TOTAL}</small>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <button class="lb-toggle" id="lbToggle" type="button">🏆 לוח מובילים</button>
      </div>
      <span class="q-mascot" id="mascot">🦥</span>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts">
        ${q.opts.map((o,idx)=>`
          <button class="opt" data-idx="${idx}">
            <span class="key">${KEYS[idx]||(idx+1)}</span><span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="banner" id="banner"></div>
      <div class="next-row" id="nextRow">
        <button class="btn btn-green" id="nextBtn">
          ${state.i+1 >= TOTAL ? 'לסיכום ←' : 'המשך ←'}
        </button>
      </div>`;

    state.locked = false;
    card.querySelectorAll('.opt').forEach(b=>b.addEventListener('click', onAnswer));
    const nb = document.getElementById('nextBtn');
    nb.addEventListener('click', advance);
    const lbt = document.getElementById('lbToggle');
    if(lbt) lbt.addEventListener('click', openLeaderboard);
  }

  function onAnswer(e){
    if(state.locked) return;
    state.locked = true;
    const q = QUESTIONS[state.i];
    const chosen = +e.currentTarget.dataset.idx;
    const right = chosen === q.correct;
    const opts = card.querySelectorAll('.opt');
    opts.forEach(b=>{
      b.disabled = true;
      const idx = +b.dataset.idx;
      if(idx === q.correct) b.classList.add('correct');
      else if(idx === chosen) b.classList.add('wrong');
    });

    const banner = document.getElementById('banner');
    const mascot = document.getElementById('mascot');

    if(right){
      state.xp += XP_PER;
      state.streak += 1;
      state.correctCount += 1;
      const xpEl = document.getElementById('xp');
      xpEl.querySelector('.num').textContent = state.xp;
      xpEl.classList.add('bump'); setTimeout(()=>xpEl.classList.remove('bump'),220);
      mascot.textContent = rand(SLOTH_OK);
      mascot.classList.add('react');
      banner.className = 'banner ok show';
      banner.innerHTML = `<span class="b-emoji">✅</span><span><span class="b-title">${rand(PRAISE)} +${XP_PER} XP</span><span class="b-why">${q.why}</span></span>`;
    } else {
      state.hearts -= 1;
      state.streak = 0;
      const heartEls = card.querySelectorAll('.hearts span');
      if(heartEls[state.hearts]) heartEls[state.hearts].classList.add('lost');
      mascot.textContent = '🥺';
      banner.className = 'banner bad show';
      banner.innerHTML = `<span class="b-emoji">💛</span><span><span class="b-title">${rand(MISS)} התשובה הנכונה מסומנת בירוק.</span><span class="b-why">${q.why}</span></span>`;
    }

    document.getElementById('nextRow').classList.add('show');
    if(state.hearts <= 0){
      document.getElementById('nextBtn').textContent = 'לסיכום ←';
    }
  }

  function advance(){
    if(state.hearts <= 0){ return renderEnd(); }
    state.i += 1;
    if(state.i >= TOTAL) return renderEnd();
    renderQuestion();
    card.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  function renderEnd(){
    const answered = state.correctCount + (MAX_HEARTS - state.hearts);
    const denom = state.hearts <= 0 ? answered : TOTAL;
    const ratio = denom ? state.correctCount/denom : 0;
    const pctScore = Math.round(ratio*100);
    const won = ratio >= 0.8 && state.hearts > 0;
    const survived = state.hearts > 0;

    let sloth, title, sub;
    if(won){ sloth='🏆'; title='אלוף השקעות!'; sub='תרגלת כמו מקצוען. משעמם ועקבי, בדיוק כמו שאוהבים.'; }
    else if(survived){ sloth='🦥'; title='סיימת את התרגול!'; sub='יפה מאוד. עוד סיבוב או שניים ותהיה חד כמו תער.'; }
    else { sloth='💛'; title='נגמרו הלבבות, אבל לא נורא'; sub='גם עצלן נופל לפעמים. נסה שוב, הפעם זה ילך חלק.'; }

    card.innerHTML = `
      <div class="end">
        <span class="big-sloth">${sloth}</span>
        <h2>${title}</h2>
        <div class="sub">${sub}</div>
        <div class="stats">
          <div class="stat"><div class="v">${state.xp}</div><div class="l">⭐ נקודות XP</div></div>
          <div class="stat"><div class="v">${state.correctCount}/${denom}</div><div class="l">✅ תשובות נכונות</div></div>
          <div class="stat"><div class="v">${pctScore}%</div><div class="l">🎯 דיוק</div></div>
        </div>
        ${miniLeaderboardHTML()}
        <div class="end-actions">
          <button class="btn btn-green" id="again">🔁 שחק שוב</button>
          <a class="btn btn-ghost" href="lesson.html">📚 חזור לקורס</a>
        </div>
      </div>`;

    document.getElementById('again').addEventListener('click', start);

    if(won){
      fireConfetti();
      Portal.toast('🎉 ' + pctScore + '% דיוק. מדהים!');
      if(window.Portal && Portal.popup){
        Portal.popup({
          emoji:'🎉',
          title:'אלוף השקעות!',
          text:'סיימת את התרגול בהצלחה. מוכן להעמיק? המסלול המלא מחכה לך.',
          ctaText:'גלה את המסלול המלא',
          cta:'lesson.html',
          onceKey:'game_win_upsell'
        });
      }
    } else if(survived){
      Portal.toast('כל הכבוד שסיימת 🦥');
    }
  }

  function fireConfetti(){
    const colors = ['#1f9e57','#ffd23f','#ff8a3d','#0f7a40','#fff7d6'];
    for(let i=0;i<70;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[i % colors.length];
      c.style.animationDuration = (2.4 + Math.random()*1.8) + 's';
      c.style.animationDelay = (Math.random()*0.5) + 's';
      if(Math.random()>0.5) c.style.borderRadius='50%';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 4800);
    }
  }

  /* ===== leaderboard ===== */
  const LB = (window.LAZY && Array.isArray(LAZY.leaderboard)) ? LAZY.leaderboard : [];

  function rankLabel(idx){
    return idx===0 ? '🥇' : idx===1 ? '🥈' : idx===2 ? '🥉' : (idx+1);
  }

  function lbRowHTML(entry, idx){
    const me = entry.me === true;
    return `<div class="lb-row${me?' me':''}">
        <div class="rank">${rankLabel(idx)}</div>
        <div class="ava">${entry.emoji||'🦥'}</div>
        <div class="nm">${entry.name}</div>
        ${me?'<span class="me-tag">זה אתה!</span>':''}
        <div class="pts">${entry.xp} XP</div>
      </div>`;
  }

  function openLeaderboard(){
    const overlay = document.getElementById('lbOverlay');
    const list = document.getElementById('lbList');
    if(!overlay || !list) return;
    list.innerHTML = LB.map((e,i)=>lbRowHTML(e,i)).join('');
    overlay.classList.add('show');
  }
  function closeLeaderboard(){
    const overlay = document.getElementById('lbOverlay');
    if(overlay) overlay.classList.remove('show');
  }
  (function bindLb(){
    const overlay = document.getElementById('lbOverlay');
    const closeBtn = document.getElementById('lbClose');
    if(closeBtn) closeBtn.addEventListener('click', closeLeaderboard);
    if(overlay) overlay.addEventListener('click', e=>{ if(e.target===overlay) closeLeaderboard(); });
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLeaderboard(); });
  })();

  // mini window around the me:true entry (2 above + me + 1 below)
  function miniLeaderboardHTML(){
    const meIdx = LB.findIndex(e=>e.me===true);
    if(meIdx < 0) return '';
    const startIdx = Math.max(0, meIdx-2);
    const endIdx = Math.min(LB.length, meIdx+2); // inclusive of 1 below
    const rows = [];
    for(let i=startIdx;i<endIdx;i++){ rows.push(lbRowHTML(LB[i], i)); }
    return `<div class="lb-mini">
        <div class="mini-title">🏆 המקום שלך בלוח</div>
        <div class="lb-list">${rows.join('')}</div>
      </div>`;
  }

  function start(){
    if(!TOTAL){
      card.innerHTML = '<div class="end"><span class="big-sloth">🦥</span><h2>אין שאלות עדיין</h2><div class="sub">המשחק יתמלא בקרוב. בינתיים אפשר לחזור לקורס.</div><div class="end-actions"><a class="btn btn-green" href="lesson.html">📚 חזור לקורס</a></div></div>';
      return;
    }
    reset();
    renderQuestion();
  }

  start();
})();
</script>
</body>
</html>
