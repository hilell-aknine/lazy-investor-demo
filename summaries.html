<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E🦥%3C/text%3E%3C/svg%3E">
<title>השקעות לעצלנים · סיכומי שיעור</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link href="assets/brand.css" rel="stylesheet">
<style>
  /* ===== summaries page ===== */
  .page-head{padding:34px 0 6px}
  .page-head h1{font-size:30px;font-weight:900;line-height:1.15}
  .page-head h1 em{font-style:normal;color:var(--green-deep)}
  .page-head p{color:var(--muted);font-size:16px;margin-top:8px;max-width:640px}

  /* search */
  .search-row{display:flex;align-items:center;gap:12px;margin:22px 0 6px;flex-wrap:wrap}
  .search-box{flex:1;min-width:240px;position:relative}
  .search-box .ico{position:absolute;top:50%;right:16px;transform:translateY(-50%);font-size:17px;opacity:.6;pointer-events:none}
  .search-box input{width:100%;border:1px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit;font-size:15px;font-weight:500;padding:13px 46px 13px 16px;border-radius:14px;transition:border-color .15s,box-shadow .15s}
  .search-box input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
  .count-pill{font-weight:700;font-size:13px;color:var(--muted);background:var(--card);border:1px solid var(--line);padding:9px 14px;border-radius:20px;flex:none}

  /* grid */
  .sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding:18px 0 6px}
  @media(max-width:760px){.sum-grid{grid-template-columns:1fr}}

  .scard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;display:flex;flex-direction:column;transition:box-shadow .18s,transform .18s;position:relative;overflow:hidden}
  .scard::before{content:"";position:absolute;top:0;right:0;left:0;height:4px;background:linear-gradient(90deg,var(--green),var(--yellow));opacity:0;transition:opacity .2s}
  .scard:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
  .scard:hover::before{opacity:1}

  .scard-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
  .badge{flex:none;width:46px;height:46px;border-radius:14px;background:var(--green-soft);color:var(--green-deep);display:grid;place-items:center;font-weight:900;font-size:20px}
  .scard-head h3{font-size:18px;font-weight:800;line-height:1.25}
  .scard-head small{display:block;color:var(--muted);font-size:12.5px;font-weight:600;margin-top:2px}

  .points{list-style:none;display:flex;flex-direction:column;gap:11px;margin:2px 0 16px}
  .points li{display:flex;gap:10px;align-items:flex-start;font-size:14.5px;line-height:1.5;color:var(--ink)}
  .points .ck{flex:none;width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:900;margin-top:1px}

  .topics{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;padding-top:14px;border-top:1px solid var(--line)}
  .topics .tag{background:var(--yellow-soft);color:#a8780a}
  html[data-theme="dark"] .topics .tag{background:var(--yellow-soft);color:var(--yellow)}

  .scard-foot{margin-top:14px}
  .watch{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;color:var(--green-deep);transition:gap .15s}
  .watch:hover{gap:11px}

  .empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .em{font-size:48px;display:block;margin-bottom:10px}
  .empty b{display:block;font-size:18px;color:var(--ink);font-weight:800;margin-bottom:6px}
</style>
</head>
<body>

<div class="demo-flag">🦥 דמו פורטל · <b>השקעות לעצלנים</b> · סיכומי שיעור</div>

<header class="topbar"><div class="wrap">
  <div class="brand"><span class="sloth">🦥</span> השקעות לעצלנים</div>
  <nav class="nav">
    <a href="index.html">הבית שלי</a>
    <a href="lesson.html">הקורס</a>
    <a href="game.html">משחק תרגול</a>
    <a href="community.html">הקהילה</a>
    <a href="calculator.html">מחשבונים</a>
  </nav>
  <div class="me"><a href="admin.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:600" title="מבט הבעלים">⚙️ ניהול</a><a href="profile.html" style="display:flex;align-items:center;gap:10px"><div style="text-align:left"><div style="font-weight:700;line-height:1.1">דנה</div><small>חברה מאז 2026</small></div><div class="avatar">ד</div></a></div>
</div></header>

<div class="wrap">

  <div class="page-head">
    <h1>סיכומי <em>שיעור</em> 📝</h1>
    <p>הנקודות החשובות מכל שלב, במקום אחד. מושלם לחזרה מהירה לפני שמתחילים.</p>
  </div>

  <div class="search-row">
    <div class="search-box">
      <span class="ico">🔍</span>
      <input type="text" id="search" placeholder="חיפוש לפי שם שלב, למשל: תיק, מדד, פנסיה…" autocomplete="off">
    </div>
    <span class="count-pill" id="countPill"></span>
  </div>

  <div class="sum-grid" id="grid"></div>

</div>

<footer><div class="wrap"><div>© השקעות לעצלנים · הדרך הקלה להשקעות פסיביות 🦥</div><div class="credit">נבנה ע"י הלל</div></div></footer>

<script src="data/content.js"></script>
<script src="assets/portal.js"></script>
<script>
(function(){
  const data = (window.LAZY && Array.isArray(LAZY.summaries)) ? LAZY.summaries : [];
  const grid = document.getElementById('grid');
  const input = document.getElementById('search');
  const countPill = document.getElementById('countPill');

  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function cardHtml(s){
    const points = (s.points||[]).map(p =>
      `<li><span class="ck">✓</span><span>${esc(p)}</span></li>`).join('');
    const topics = (s.topics||[]).map(t =>
      `<span class="tag"># ${esc(t)}</span>`).join('');
    return `<article class="scard">
        <div class="scard-head">
          <div class="badge">${esc(s.n)}</div>
          <div>
            <h3>${esc(s.title)}</h3>
            <small>שלב ${esc(s.n)} · סיכום מהיר</small>
          </div>
        </div>
        <ul class="points">${points}</ul>
        <div class="topics">${topics}</div>
        <div class="scard-foot">
          <a class="watch" href="lesson.html?m=${esc(s.n)}&c=1">▶ לצפייה בשיעור</a>
        </div>
      </article>`;
  }

  function render(list){
    if(!list.length){
      grid.innerHTML = `<div class="empty">
          <span class="em">🦥</span>
          <b>לא מצאנו סיכום שמתאים</b>
          נסה מילת חיפוש אחרת, או נקה את החיפוש כדי לראות את כל השלבים.
        </div>`;
      countPill.textContent = '0 שלבים';
      return;
    }
    grid.innerHTML = list.map(cardHtml).join('');
    countPill.textContent = list.length === data.length
      ? `${data.length} שלבים`
      : `${list.length} מתוך ${data.length}`;
  }

  function filter(){
    const q = input.value.trim().toLowerCase();
    if(!q){ render(data); return; }
    const out = data.filter(s => {
      const hay = [s.title, ...(s.topics||[]), ...(s.points||[])].join(' ').toLowerCase();
      return hay.includes(q);
    });
    render(out);
  }

  input.addEventListener('input', filter);
  render(data);
})();
</script>
</body>
</html>
